name: Build and Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  firmware:
    name: Firmware
    runs-on: ubuntu-24.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip

      - name: Restore firmware cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            firmware/.tools
          key: firmware-${{ runner.os }}-${{ hashFiles('firmware/Cargo.lock', 'firmware/rust-toolchain.toml', 'firmware/sdkconfig.defaults', 'firmware/partitions.csv', 'firmware/scripts/build.sh') }}
          restore-keys: |
            firmware-${{ runner.os }}-

      - name: Install Rust for Xtensa
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: false
          ldproxy: true

      - name: Build firmware
        working-directory: firmware
        run: ./scripts/build.sh

      - name: Upload flash images for desktop bundle
        uses: actions/upload-artifact@v7
        with:
          name: firmware-flash
          path: firmware/target/flash/*.bin
          if-no-files-found: error

      - name: Package firmware
        run: |
          mkdir -p dist
          zip -j dist/quota-dock-firmware.zip \
            firmware/target/flash/app.bin \
            firmware/target/flash/bootloader.bin \
            firmware/target/flash/partition-table.bin

      - name: Upload firmware release package
        uses: actions/upload-artifact@v7
        with:
          name: release-firmware
          path: dist/quota-dock-firmware.zip
          if-no-files-found: error

  desktop:
    name: Desktop (${{ matrix.name }})
    needs: firmware
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-2025
            target: x86_64-pc-windows-msvc
            package: quota-dock-desktop-windows-x64.zip
          - name: macos-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            package: quota-dock-desktop-macos-x64.tar.gz
          - name: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
            package: quota-dock-desktop-macos-arm64.tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust target
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Restore desktop cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            desktop/target
          key: desktop-${{ matrix.target }}-${{ hashFiles('desktop/Cargo.lock', 'desktop/Cargo.toml', 'core/Cargo.toml') }}
          restore-keys: |
            desktop-${{ matrix.target }}-

      - name: Prepare firmware bundle inputs
        shell: bash
        run: mkdir -p firmware/target/flash

      - name: Download firmware flash images
        uses: actions/download-artifact@v8
        with:
          name: firmware-flash
          path: firmware/target/flash

      - name: Test desktop
        working-directory: desktop
        run: cargo test --locked --target ${{ matrix.target }}

      - name: Build desktop
        working-directory: desktop
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Windows desktop app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive `
            -Path "desktop\target\${{ matrix.target }}\release\quota-dock-desktop.exe" `
            -DestinationPath "dist\${{ matrix.package }}" `
            -Force

      - name: Package macOS desktop app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          app_dir="dist/QuotaDock.app"
          executable="$app_dir/Contents/MacOS/QuotaDock"

          mkdir -p "$app_dir/Contents/MacOS"
          cp "desktop/target/${{ matrix.target }}/release/quota-dock-desktop" "$executable"
          chmod +x "$executable"

          cat > "$app_dir/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>QuotaDock</string>
            <key>CFBundleExecutable</key>
            <string>QuotaDock</string>
            <key>CFBundleIdentifier</key>
            <string>dev.quotadock.app</string>
            <key>CFBundleName</key>
            <string>QuotaDock</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>0.1.0</string>
            <key>CFBundleVersion</key>
            <string>0.1.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          codesign --force --deep --sign - "$app_dir"
          tar -czf "dist/${{ matrix.package }}" -C dist "QuotaDock.app"

      - name: Upload desktop release package
        uses: actions/upload-artifact@v7
        with:
          name: release-desktop-${{ matrix.name }}
          path: dist/${{ matrix.package }}
          if-no-files-found: error

  release:
    name: GitHub Release
    needs:
      - firmware
      - desktop
    if: github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download release packages
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
