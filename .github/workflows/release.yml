name: Build and Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  firmware:
    name: Firmware
    runs-on: ubuntu-24.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip

      - name: Restore firmware cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            firmware/.tools
          key: firmware-${{ runner.os }}-${{ hashFiles('firmware/Cargo.lock', 'firmware/rust-toolchain.toml', 'firmware/sdkconfig.defaults', 'firmware/partitions.csv', 'firmware/scripts/build.sh') }}
          restore-keys: |
            firmware-${{ runner.os }}-

      - name: Install Rust for Xtensa
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: false
          ldproxy: true

      - name: Build firmware
        working-directory: firmware
        run: ./scripts/build.sh

      - name: Upload flash images for desktop bundle
        uses: actions/upload-artifact@v7
        with:
          name: firmware-flash
          path: firmware/target/flash/*.bin
          if-no-files-found: error

      - name: Package firmware
        run: |
          mkdir -p dist
          zip -j dist/quota-dock-firmware.zip \
            firmware/target/flash/app.bin \
            firmware/target/flash/bootloader.bin \
            firmware/target/flash/partition-table.bin

      - name: Upload firmware release package
        uses: actions/upload-artifact@v7
        with:
          name: release-firmware
          path: dist/quota-dock-firmware.zip
          if-no-files-found: error

  desktop:
    name: Desktop (${{ matrix.name }})
    needs: firmware
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: ubuntu-24.04
            target: x86_64-pc-windows-msvc
            package: quota-dock-desktop-windows-x64.zip
            xwin: true
          - name: macos-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            package: quota-dock-desktop-macos-x64.tar.gz
            xwin: false
          - name: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
            package: quota-dock-desktop-macos-arm64.tar.gz
            xwin: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust target
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add ${{ matrix.target }}

      - name: Restore desktop cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            ~/.cache/cargo-xwin
            desktop/target
            ~/.pnpm-store
          key: desktop-${{ matrix.target }}-${{ hashFiles('desktop/Cargo.lock', 'desktop/Cargo.toml', 'desktop/pnpm-lock.yaml', 'core/Cargo.toml') }}
          restore-keys: |
            desktop-${{ matrix.target }}-

      - name: Install Node dependencies
        working-directory: desktop
        shell: bash
        run: |
          corepack enable
          pnpm install --frozen-lockfile

      - name: Install Windows cross build dependencies
        if: matrix.xwin == true
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld llvm zip
          cargo install cargo-xwin --locked

      - name: Prepare firmware bundle inputs
        shell: bash
        run: mkdir -p firmware/target/flash

      - name: Download firmware flash images
        uses: actions/download-artifact@v8
        with:
          name: firmware-flash
          path: firmware/target/flash

      - name: Test desktop
        if: matrix.xwin == false
        working-directory: desktop
        run: cargo test --locked --target ${{ matrix.target }}

      - name: Test desktop
        if: matrix.xwin == true
        working-directory: desktop
        run: cargo test --locked

      - name: Typecheck desktop UI
        working-directory: desktop
        run: pnpm typecheck

      - name: Build desktop
        working-directory: desktop
        shell: bash
        run: |
          if [ "${{ matrix.xwin }}" = "true" ]; then
            pnpm frontend:build
            cargo xwin build --release --locked --target ${{ matrix.target }} --features custom-protocol
          else
            pnpm build -- --target ${{ matrix.target }}
          fi

      - name: Package Windows desktop app
        if: matrix.xwin == true
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          zip -j "dist/${{ matrix.package }}" \
            "desktop/target/${{ matrix.target }}/release/quota-dock-desktop.exe"

      - name: Package macOS desktop app
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          tar -czf "dist/${{ matrix.package }}" -C "desktop/target/${{ matrix.target }}/release" quota-dock-desktop

      - name: Upload desktop release package
        uses: actions/upload-artifact@v7
        with:
          name: release-desktop-${{ matrix.name }}
          path: dist/${{ matrix.package }}
          if-no-files-found: error

  release:
    name: GitHub Release
    needs:
      - firmware
      - desktop
    if: github.ref_type == 'tag'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download release packages
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
